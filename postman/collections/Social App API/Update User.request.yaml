$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/api/users/:id'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
    description: The ID of the user to update
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "email": "updated@example.com"
    }
